<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  <!-- Rounded rect for modern app look -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <!-- Bold clean white letter 'U' in the center -->
  <text x="50%" y="60%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="290" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">U</text>
</svg>
